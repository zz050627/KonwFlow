# ==================== Server Configuration ====================
server:
  port: ${RAGENT_SERVER_PORT:${SERVER_PORT:9090}}
  servlet:
    context-path: /api/ragent
  tomcat:
    threads:
      max: 16
      min-spare: 4

# ==================== Spring Framework ====================
spring:
  application:
    name: ragent
  profiles:
    active: dev
  config:
    import: optional:file:./ragent-secrets.yaml
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://127.0.0.1:5432/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 5
      minimum-idle: 1
      pool-name: RagentHikariPool
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

# ==================== Infrastructure Services ====================
rustfs:
  url: http://localhost:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: ragent-producer_pg
    send-message-timeout: 2000
  consumer:
    consume-thread-min: 2
    consume-thread-max: 4

milvus:
  uri: http://localhost:19530

# ==================== RAG Configuration ====================
rag:
  vector:
    type: pg  # milvus or pg
  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
  query-rewrite:
    enabled: true
    max-history-messages: 4
    max-history-chars: 500
  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200
  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30
  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300
  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

# ==================== AI Configuration ====================
ai:
  providers:
    ollama:
      url: ${OLLAMA_BASE_URL:http://localhost:11434}
      endpoints:
        chat: /api/chat
        embedding: /api/embed
  chat:
    default-model: qwen2.5-ollama
    deep-thinking-model: qwen2.5-ollama
    candidates:
      - id: qwen2.5-ollama
        provider: ollama
        model: ${OLLAMA_CHAT_MODEL:qwen2.5:0.5b}
        priority: 0
        enabled: true
        supports-thinking: false
  embedding:
    default-model: qwen2.5-ollama-embed
    candidates:
      - id: qwen2.5-ollama-embed
        provider: ollama
        model: ${OLLAMA_EMBEDDING_MODEL:qwen2.5:0.5b}
        dimension: ${OLLAMA_EMBEDDING_DIM:896}
        priority: 0
        enabled: true
  keyword:
    extractor: ollama
    model-id: qwen2.5-ollama
    max-keywords: 5
  selection:
    failure-threshold: 3
    open-duration-ms: 30000
  stream:
    message-chunk-size: 5
