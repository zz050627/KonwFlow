services:
  # ==================== 前端 (Nginx) ====================
  web:
    container_name: knowflow-web
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - knowflow-net
    restart: unless-stopped

  # ==================== 后端 (Spring Boot) ====================
  backend:
    container_name: knowflow-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # --- 数据库 ---
      SPRING_DATASOURCE_URL: jdbc:postgresql://knowflow-db:5432/knowflow?client_encoding=UTF8
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # --- Redis ---
      SPRING_DATA_REDIS_HOST: knowflow-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      # --- RustFS ---
      RUSTFS_URL: http://knowflow-fs:9000
      RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      # --- RocketMQ ---
      ROCKETMQ_NAME_SERVER: knowflow-rmq-ns:9876
      # --- Ollama（宿主机） ---
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # --- RAG ---
      RAG_VECTOR_TYPE: pg
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/ragent-secrets.yaml:/app/ragent-secrets.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/api/ragent/auth/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      knowflow-db:
        condition: service_healthy
      knowflow-redis:
        condition: service_healthy
      knowflow-rmq-ns:
        condition: service_healthy
      knowflow-fs:
        condition: service_healthy
    networks:
      - knowflow-net
    restart: unless-stopped

  # ==================== PostgreSQL (pgvector) ====================
  knowflow-db:
    container_name: knowflow-db
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: knowflow
    volumes:
      - ./backend/resources/database/schema_pg.sql:/docker-entrypoint-initdb.d/0-schema.sql
      - ./backend/resources/database/init_data_pg.sql:/docker-entrypoint-initdb.d/1-init-data.sql
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowflow-net
    restart: unless-stopped

  # ==================== Redis ====================
  knowflow-redis:
    container_name: knowflow-redis
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowflow-net
    restart: unless-stopped

  # ==================== RustFS (S3 兼容存储) ====================
  knowflow-fs:
    container_name: knowflow-fs
    image: rustfs/rustfs:1.0.0-alpha.72
    command:
      - "--address"
      - ":9000"
      - "--console-enable"
      - "--access-key"
      - "${RUSTFS_ACCESS_KEY:-rustfsadmin}"
      - "--secret-key"
      - "${RUSTFS_SECRET_KEY:-rustfsadmin}"
      - "/data"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - ./docker-data/rustfs:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9000"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - knowflow-net
    restart: unless-stopped

  # ==================== RocketMQ NameServer ====================
  knowflow-rmq-ns:
    container_name: knowflow-rmq-ns
    image: apache/rocketmq:5.2.0
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx400m"
    command: sh mqnamesrv
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'The Name Server boot success' /home/rocketmq/logs/rocketmqlogs/namesrv.log || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - knowflow-net
    restart: unless-stopped

  # ==================== RocketMQ Broker ====================
  knowflow-rmq-broker:
    container_name: knowflow-rmq-broker
    image: apache/rocketmq:5.2.0
    environment:
      NAMESRV_ADDR: "knowflow-rmq-ns:9876"
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
    depends_on:
      knowflow-rmq-ns:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        cat > /home/rocketmq/rocketmq-5.2.0/conf/broker.conf << EOF
        brokerClusterName = DefaultCluster
        brokerName = broker-a
        brokerId = 0
        deleteWhen = 04
        fileReservedTime = 48
        brokerRole = ASYNC_MASTER
        flushDiskType = ASYNC_FLUSH
        brokerIP1 = knowflow-rmq-broker
        timerMaxDelaySec = 31622400
        EOF
        sh mqbroker --enable-proxy -c /home/rocketmq/rocketmq-5.2.0/conf/broker.conf
    networks:
      - knowflow-net
    restart: unless-stopped

networks:
  knowflow-net:
    driver: bridge
